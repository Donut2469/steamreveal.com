<!DOCTYPE html>
<html>
<head>
<title>Steam Profile Stats</title>

<style>
body{
background:#0b0f14;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
color:#66c0f4;
}

input{
padding:10px;
width:260px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#66c0f4;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#417a9b;
}

#profile{
margin-top:30px;
}

.card{
background:#171a21;
padding:20px;
border-radius:10px;
display:inline-block;
width:350px;
}

img{
border-radius:10px;
}

.stat{
margin-top:10px;
}

.error{
color:red;
margin-top:20px;
}
</style>
</head>

<body>

<h1>Steam Profile Stats</h1>

<input id="steamid" placeholder="SteamID64">
<button onclick="loadProfile()">Search</button>

<div id="profile"></div>

<script>
const API_KEY = "AEC7A268006451D900F73AE712266DF6";

async function loadProfile(){
    let steamid = document.getElementById("steamid").value.trim();
    let output = document.getElementById("profile");

    if(!steamid){
        output.innerHTML = "<p class='error'>Please enter a SteamID64</p>";
        return;
    }

    output.innerHTML = "<p>Loading profile...</p>";

    try{
        let profileURL =
        `https://corsproxy.io/?https://api.steampowered.com/ISteamUser/GetPlayerSummaries/v2/?key=${API_KEY}&steamids=${steamid}`;

        let gamesURL =
        `https://corsproxy.io/?https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=${API_KEY}&steamid=${steamid}&include_appinfo=true`;

        let profileResponse = await fetch(profileURL);
        let profileData = await profileResponse.json();

        if(!profileData.response || !profileData.response.players || profileData.response.players.length === 0){
            output.innerHTML = "<p class='error'>User not found</p>";
            return;
        }

        let player = profileData.response.players[0];
        let visibility = player.communityvisibilitystate == 3 ? "Public" : "Private";

        let games = null;
        let mostPlayed = null;
        let leastPlayed = null;

        try{
            let gamesResponse = await fetch(gamesURL);
            let gamesData = await gamesResponse.json();

            if(gamesData.response && gamesData.response.games){
                games = gamesData.response.games;

                if(games.length > 0){
                    mostPlayed = games.reduce((a,b)=>
                        a.playtime_forever > b.playtime_forever ? a : b
                    );

                    leastPlayed = games.reduce((a,b)=>
                        a.playtime_forever < b.playtime_forever ? a : b
                    );
                }
            }
        } catch (gamesErr) {
            console.error("Games load error:", gamesErr);
        }

        output.innerHTML = `
        <div class="card">
            <img src="${player.avatarfull}" alt="Avatar">

            <h2>${player.personaname}</h2>

            <p class="stat">
                <a href="${player.profileurl}" target="_blank">Open Steam Profile</a>
            </p>

            <p class="stat">Privacy: ${visibility}</p>

            <p class="stat">Total Games: ${games ? games.length : "Hidden or unavailable"}</p>

            <p class="stat">
                Most Played:
                ${mostPlayed ? mostPlayed.name + " (" + Math.floor(mostPlayed.playtime_forever/60) + " hrs)" : "Hidden or unavailable"}
            </p>

            <p class="stat">
                Least Played:
                ${leastPlayed ? leastPlayed.name + " (" + Math.floor(leastPlayed.playtime_forever/60) + " hrs)" : "Hidden or unavailable"}
            </p>
        </div>
        `;
    } catch(err){
        console.error(err);
        output.innerHTML =
        "<p class='error'>Error loading Steam data. Check API key, CORS proxy, or profile privacy.</p>";
    }
}
</script>

</body>
</html>
